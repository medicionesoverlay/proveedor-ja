
<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Mediciones Avanzadas - JA</title>
	<style>
		:root {
			--bg: #000000;
			--card: #1a1a1a;
			--muted: #b0b0b0;
			--text: #ffffff;
			--accent: #00a9e0;
			--accent-2: #00d4ff;
			--danger: #ff4444;
			--warning: #ffaa00;
			--chip: #2d2d2d;
			--success: #00c853;
		}
		* { box-sizing: border-box; }
		body {
			margin: 0; padding: 24px; background: var(--bg); color: var(--text);
			font-family: ui-sans-serif, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
		}
		h1 { margin: 0 0 12px; font-size: 22px; }
		h2 { margin: 0 0 8px; font-size: 18px; }
		h3 { margin: 0 0 6px; font-size: 16px; }
		
		/* Dashboard */
		.dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
		.stat-card { background: var(--card); border: 1px solid #333333; border-radius: 10px; padding: 16px; text-align: center; }
		.stat-number { font-size: 24px; font-weight: bold; margin: 8px 0; }
		.stat-label { color: var(--muted); font-size: 14px; }
		.stat-pendiente { color: var(--warning); }
		.stat-medido { color: var(--success); }
		.stat-total { color: var(--accent); }
		
		/* Toolbar avanzado */
		.toolbar { display: grid; grid-template-columns: 1fr 200px 200px 150px; gap: 12px; margin-bottom: 16px; }
		.toolbar-advanced { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
		.search-group { display: flex; gap: 8px; }
		input[type=search], input[type=text], select, input[type=date] {
			background: var(--card); border: 1px solid #444444; color: var(--text);
			padding: 10px 12px; border-radius: 8px; outline: none;
		}
		input[type=search] { flex: 1; }
		
		/* Botones */
		button, label.btn { 
			background: var(--accent); color: #ffffff; border: none; border-radius: 8px; 
			padding: 8px 12px; cursor: pointer; font-weight: 600; font-size: 14px;
		}
		button:disabled { opacity: 0.6; cursor: not-allowed; }
		label.btn.attach { display: inline-flex; align-items: center; gap: 6px; }
		button.secondary { background: #3d3d3d; color: var(--text); }
		button.danger { background: var(--danger); color: #ffffff; }
		button.success { background: var(--success); color: #ffffff; }
		button.warning { background: var(--warning); color: #000000; }
		button.small { padding: 6px 8px; font-size: 12px; }
		input[type=file] { display: none; }
		
		/* Badges y chips */
		.badge { display: inline-block; background: var(--chip); color: var(--muted); padding: 2px 8px; border-radius: 999px; font-size: 12px; }
		.badge-pendiente { background: var(--warning); color: #2b1a0b; }
		.badge-medido { background: var(--success); color: #0d2b0d; }
		
		/* Lista de activos */
		.panel { background: var(--card); border: 1px solid #333333; border-radius: 10px; padding: 12px; min-height: 200px; }
		.list { display: grid; gap: 8px; }
		.item { 
			display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; 
			background: #0d0d0d; border: 1px solid #333333; border-radius: 8px; padding: 12px; 
		}
		.item-header { display: flex; align-items: center; gap: 8px; }
		.item-meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
		.item-actions { display: flex; align-items: center; gap: 8px; }
		
		/* Detalle expandible */
		.item-detail { 
			display: none; grid-column: 1 / -1; margin-top: 12px; padding: 16px; 
			background: #0a0a0a; border: 1px solid #444444; border-radius: 8px; 
		}
		.item-detail.expanded { display: block; }
		
		/* Formularios */
		.form-group { margin-bottom: 12px; }
		.form-group label { display: block; margin-bottom: 4px; font-size: 14px; color: var(--muted); }
		textarea { 
			width: 100%; background: var(--card); border: 1px solid #444444; color: var(--text);
			padding: 8px; border-radius: 6px; resize: vertical; min-height: 60px;
		}
		
		/* Fotos y geolocalización */
		.photo-section { margin: 12px 0; }
		.thumb-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-top: 8px; }
		.thumb { 
			position: relative; border: 1px solid #555555; border-radius: 6px; overflow: hidden; 
			height: 80px; display: flex; align-items: center; justify-content: center; background: #0d0d0d; 
		}
		.thumb img, .thumb video { max-width: 100%; max-height: 100%; object-fit: cover; }
		.thumb-info { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.9); color: white; font-size: 10px; padding: 2px 4px; }
		.gps-info { background: #2d2d2d; padding: 8px; border-radius: 6px; margin: 8px 0; font-size: 12px; }
		.gps-coords { color: var(--accent); font-family: monospace; }
		
		/* Responsive */
		@media (max-width: 900px) { 
			.toolbar { grid-template-columns: 1fr; }
			.toolbar-advanced { grid-template-columns: 1fr; }
			.dashboard { grid-template-columns: repeat(2, 1fr); }
			.search-group { flex-direction: column; }
		}
		@media (max-width: 600px) { 
			body { padding: 16px; }
			.dashboard { grid-template-columns: 1fr; }
			.stat-number { font-size: 20px; }
			.item { grid-template-columns: 1fr; padding: 10px; }
			.item-header { flex-wrap: wrap; gap: 6px; }
			.item-actions { margin-top: 8px; flex-wrap: wrap; gap: 6px; }
			label.btn { width: 100%; text-align: center; }
			.thumb-grid { grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)); }
		}
		
		.hidden { display: none !important; }
		.small { font-size: 12px; }
		.footer { margin-top: 18px; color: var(--muted); font-size: 12px; }
		.error-banner { background:#2d0a0a; color:#ffcccc; border:1px solid #5a1515; padding:8px; border-radius:8px; margin-bottom:10px; }
	</style>
</head>

	<script>

	};
	try { firebase.initializeApp(FIREBASE_CONFIG); } catch (e) {}
	const fbAuth = firebase.auth();
	const fbDb = firebase.firestore();
	
	fbDb.settings({ cacheSizeBytes: firebase.firestore.CACHE_SIZE_UNLIMITED, merge: true });
	fbDb.enablePersistence({ synchronizeTabs: true }).catch(err => console.warn('Persistencia no disponible:', err.code));
	
	let authReady = false;
	fbAuth.onAuthStateChanged(user => { if (user) authReady = true; });
	fbAuth.signInAnonymously().catch(err => console.error('Error en auth:', err));

	function validarMedicion(valor, clasificacion = '') {
		if (!valor || valor.trim() === '') return { valido: false, mensaje: 'Debe ingresar un valor de medición' };
		const esNAP = clasificacion && clasificacion.toUpperCase().includes('NAP');
		const minValor = esNAP ? -3.5 : -23.5;
		const maxValor = 5.0;
		const regex = /^-?([0-9]{1,2})\.([0-9]{2})$/;
		if (!regex.test(valor)) {
			const rangoMsg = esNAP ? '-3.50 a 5.00' : '-23.50 a 5.00';
			return { valido: false, mensaje: `Formato inválido. Use: ${rangoMsg} (ej: ${esNAP ? '-2.45' : '-22.45'})` };
		}
		const num = parseFloat(valor);
		if (num < minValor || num > maxValor) {
			const rangoMsg = esNAP ? '-3.50 y 5.00' : '-23.50 y 5.00';
			return { valido: false, mensaje: `Valor fuera de rango. Debe estar entre ${rangoMsg}` };
		}
		return { valido: true, valor: valor };
	}

	function formatearMedicion(input) {
		let valor = input.value.replace(/[^0-9.-]/g, ''); 
		if (valor.startsWith('.')) valor = '0' + valor;
		const puntos = valor.split('.');
		if (puntos.length > 2) valor = puntos[0] + '.' + puntos.slice(1).join('');
		if (puntos.length === 2 && puntos[1].length > 2) valor = puntos[0] + '.' + puntos[1].substring(0, 2);
		input.value = valor;
	}

	async function saveMeasurementToFirestore(payload, retries = 3) {
		const { proveedor, activo } = payload;
		const id = `${proveedor}::${activo}`;
		const ref = fbDb.collection('mediciones').doc(id);
		
		for (let i = 0; i < retries; i++) {
			try {
				await ref.set({ ...payload, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
				return;
			} catch (e) {
				if (i === retries - 1) throw e;
				await new Promise(r => setTimeout(r, 1000 * (i + 1))); 
			}
		}
	}

	async function deleteMeasurementFromFirestore(proveedor, activo) {
		try {
			const id = `${proveedor}::${activo}`;
			await fbDb.collection('mediciones').doc(id).delete();
		} catch (e) {}
	}
	</script>

	const ALL_CLASSES = ["CDO", "NAP"];

	let items = INITIAL_ITEMS.map((x, idx) => ({ ...x, id: idFor(x), _idx: idx }));
	let states = new Map(); 
	let selectedId = null;
	let isOnline = navigator.onLine;

	const listEl = document.getElementById('list');
	const q = document.getElementById('q');
	
	function idFor(item) {
		return PROVIDER_KEY + '::' + String(item.activo || '').trim();
	}

	function getCurrentTimestamp() { return new Date().toISOString(); }
	function formatDate(dateStr) { return new Date(dateStr).toLocaleString('es-ES'); }

	async function getCurrentLocation() {
		return new Promise((resolve, reject) => {
			if (!navigator.geolocation) return reject(new Error('Geolocalización no soportada'));
			navigator.geolocation.getCurrentPosition(
				(position) => {
					resolve({ lat: position.coords.latitude, lng: position.coords.longitude, accuracy: position.coords.accuracy });
				},
				(error) => { reject(new Error('Error al capturar GPS')); },
				{ enableHighAccuracy: true, timeout: 10000, maximumAge: 300000 }
			);
		});
	}

	function render() {
		const query = (q.value || '').toLowerCase();
		const clasif = document.getElementById('filterClasif').value || '';
		const est = document.getElementById('filterEstado').value || 'pendiente';

		const filtered = items.filter(it => {
			const st = states.get(it.id);
			const estado = st?.estado || 'pendiente';
			if (est !== 'todos' && estado !== est) return false;
			if (clasif && String(it.clasificacion || '').toLowerCase() !== clasif.toLowerCase()) return false;
			if (!query) return true;
			const searchText = [it.activo, it.clasificacion].join(' ').toLowerCase();
			return searchText.includes(query);
		});

		listEl.innerHTML = '';
		for (const it of filtered) {
			const st = states.get(it.id);
			const estado = st?.estado || 'pendiente';
			const isSelected = selectedId === it.id;
			
			const div = document.createElement('div');
			div.className = 'item';
			const hasRechazo = st?.observacion_rechazo ? true : false;
			
			if (hasRechazo) {
				div.style.borderLeft = '4px solid var(--danger)';
				div.style.background = '#1a0505';
			}
			
			div.innerHTML = `
				<div>
					<div class="item-header">
						<strong>${it.activo || '(Sin Activo)'}</strong> 
						<span class="badge ${estado === 'medido' ? 'badge-medido' : 'badge-pendiente'}">${it.clasificacion || ''}</span>
						${hasRechazo ? '<span class="badge" style="background:var(--danger);color:#fff;font-weight:bold;">❌ RECHAZADA</span>' : ''}
					</div>
					<div class="item-meta">Estado: ${estado} | Fotos: ${st?.files?.length || 0}/1</div>
				</div>
				<div class="item-actions">
					<button class="secondary small" data-id="${it.id}" data-action="ver">${isSelected ? 'Ocultar' : 'Ver'}</button>
				</div>
			`;
			
			const detailDiv = document.createElement('div');
			detailDiv.className = `item-detail ${isSelected ? 'expanded' : ''}`;
			detailDiv.id = `detail-${it.id}`;
			
			if (isSelected) setTimeout(() => { renderDetail(it, detailDiv); }, 0);
			
			listEl.appendChild(div);
			listEl.appendChild(detailDiv);
		}
		
		document.getElementById('statTotal').textContent = items.length;
	}

	function safeRender() { try { render(); } catch(e){} }

	function renderDetail(it, container) {
		const st = states.get(it.id) || { estado: 'pendiente', files: [], notes: [], gps: [], audit: [], validations: {} };
		const isReadOnly = st.estado === 'pendiente_revision' || st.estado === 'medido';
		const esNAP = it.clasificacion && it.clasificacion.toUpperCase().includes('NAP');
		const rangoTexto = esNAP ? '-3.50 a 5.00' : '-23.50 a 5.00';
		const ejemploValor = esNAP ? '-2.45' : '-22.45';
		
		container.innerHTML = `
			<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
				<div>
					<h3>${it.activo || '(Sin Activo)'} <span class="badge">${it.clasificacion || ''}</span></h3>
			</div>
			${!isReadOnly ? `<div style="display: flex; gap: 8px;">
				<label class="btn attach" for="fileInput-${it.id}">📁 Adjuntar Foto</label>
				<input id="fileInput-${it.id}" type="file" accept="image/*,video/*" />
			</div>` : ''}
			</div>			

			<div id="rechazo-${it.id}" style="${st.observacion_rechazo ? 'display:block' : 'display:none'};background:#2d0a0a;border-left:4px solid var(--danger);padding:12px;margin-bottom:12px;">
				<strong style="color:var(--danger);">❌ Rechazada:</strong> ${st.observacion_rechazo || ''}
			</div>
			
			<div class="photo-section"><div class="thumb-grid" id="thumbs-${it.id}"></div></div>
			
			<div class="form-group">
				<label>Valor de medición:</label>
				<input id="valorMedicion-${it.id}" type="text" placeholder="Ej: ${ejemploValor}" maxlength="6" value="${st.valor_medicion || ''}" ${isReadOnly ? 'readonly' : ''} style="font-family: monospace;" />
				<small class="small" style="color:var(--muted);display:block;margin-top:4px;">Rango: ${rangoTexto}</small>
			</div>
			
			${!isReadOnly ? `<div style="margin-top: 16px; display: flex; gap: 8px;">
				<button id="markMedido-${it.id}" ${st.files?.length ? '' : 'disabled'} class="success">✅ Enviar a Revisión</button>
				<button class="danger" id="reset-${it.id}">🔄 Reiniciar</button>
			</div>` : `<div style="margin-top: 16px; padding: 12px; background: #2d2d2d; text-align: center;"><strong>Estado: ${st.estado === 'pendiente_revision' ? '🟡 En Revisión' : '✅ Medido'}</strong></div>`}
		`;

		if (!isReadOnly) setupDetailEvents(it, container);
		refreshThumbs(it.id, isReadOnly);
	}

	function setupDetailEvents(it, container) {
		const input = document.getElementById(`fileInput-${it.id}`);
		const btnMedido = document.getElementById(`markMedido-${it.id}`);
		const btnReset = document.getElementById(`reset-${it.id}`);
		const valorMedicionInput = document.getElementById(`valorMedicion-${it.id}`);
		
		valorMedicionInput?.addEventListener('input', (e) => { formatearMedicion(e.target); });
		
		input?.addEventListener('change', async (ev) => {
			const files = Array.from(ev.target.files || []);
			if (!files.length) return;
			
			const st = states.get(it.id) || { estado: 'pendiente', files: [], gps: [] };
			if (st.files?.length >= 1) {
				alert('Ya adjuntaste 1 foto. Elimínala para cambiarla.');
				ev.target.value = ''; 
				return;
			}
			
			let lastGPS = null;
			try { lastGPS = await getCurrentLocation(); st.gps.push(lastGPS); } catch {}
			
			const f = files[0];
			const dataUrl = await new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(f); });
			st.files = [{ name: f.name, type: f.type, dataUrl }];
			
			if (isOnline) {
				try {
					const up = await postForm(WEBAPP_URL, {
						action: 'uploadPhoto', proveedor: PROVIDER_NAME, activo: it.activo,
						fileName: f.name, mimeType: f.type, base64Data: dataUrl.split(',')[1],
						gps_lat: lastGPS?.lat ?? '', gps_lng: lastGPS?.lng ?? ''
					});
					if (up?.success) st.remoteUrls = [up.thumbnailUrl];
				} catch (e) { console.warn('Error upload', e); }
			}
			
			states.set(it.id, st);
			if (btnMedido) btnMedido.removeAttribute('disabled');
			refreshThumbs(it.id);
		});

		btnMedido?.addEventListener('click', async (e) => {
			const currentBtn = e.currentTarget;
			const st = states.get(it.id);
			
			if (!st.files || st.files.length === 0) { alert('Adjunta una foto antes de enviar.'); return; }
			const valor_medicion = document.getElementById(`valorMedicion-${it.id}`)?.value?.trim() || '';
			const validacion = validarMedicion(valor_medicion, it.clasificacion);
			if (!validacion.valido) { alert(validacion.mensaje); return; }
			
			const fotosUrls = (st.remoteUrls || []).join(';');
			if (!fotosUrls) { alert('⚠️ La foto no se subió a Drive. Intenta de nuevo.'); return; }
			
			// PROTECCIÓN ANTI DOBLE CLIC
			currentBtn.disabled = true;
			const textoOriginal = currentBtn.innerHTML;
			currentBtn.innerHTML = '⏳ Enviando...';
			
			try {
				const payload = {
					proveedor: PROVIDER_KEY,
					activo: it.activo,
					clasificacion: it.clasificacion,
					estado: 'pendiente_revision',
					fecha_medicion: getCurrentTimestamp(),
					fotos_cantidad: st.files.length,
					fotos_uris: fotosUrls,
					valor_medicion: valor_medicion,
					gps_lat: st.gps?.length ? st.gps[0].lat : '',
					gps_lng: st.gps?.length ? st.gps[0].lng : ''
				};
				
				await saveMeasurementToFirestore(payload);
				st.estado = 'pendiente_revision';
				st.valor_medicion = valor_medicion;
				delete st.observacion_rechazo;
				states.set(it.id, st);
				alert('✅ Medición enviada correctamente.');
				safeRender();
			} catch(err) {
				alert('Error al enviar: ' + err.message);
				currentBtn.disabled = false;
				currentBtn.innerHTML = textoOriginal;
			}
		});
		
		btnReset?.addEventListener('click', async () => {
			if (prompt('PIN:') !== PIN_RESET) return;
			const st = states.get(it.id);
			st.estado = 'pendiente'; st.files = []; st.remoteUrls = []; delete st.valor_medicion; delete st.observacion_rechazo;
			states.set(it.id, st);
			deleteMeasurementFromFirestore(PROVIDER_KEY, it.activo);
			safeRender();
		});
	}

	function refreshThumbs(itemId, isReadOnly = false) {
		const thumbs = document.getElementById(`thumbs-${itemId}`);
		if (!thumbs) return;
		const st = states.get(itemId);
		thumbs.innerHTML = '';
		(st?.files || []).forEach((f, idx) => {
			const el = document.createElement('div');
			el.className = 'thumb';
			el.innerHTML = `<img src="${f.dataUrl}" />`;
			if (!isReadOnly) {
				const del = document.createElement('button');
				del.textContent = '×'; del.className = 'danger';
				del.style = 'position:absolute;top:2px;right:2px;';
				del.onclick = () => { st.files.splice(idx, 1); states.set(itemId, st); refreshThumbs(itemId); document.getElementById(`markMedido-${itemId}`)?.setAttribute('disabled','true'); };
				el.appendChild(del);
			}
			thumbs.appendChild(el);
		});
	}

	async function postForm(url, payload) {
		const fd = new FormData();
		for (const [k,v] of Object.entries(payload)) fd.append(k, String(v||''));
		const resp = await fetch(url, { method: 'POST', body: fd, mode: 'cors' });
		return JSON.parse(await resp.text());
	}

	listEl.addEventListener('click', (ev) => {
		const btn = ev.target.closest('button');
		if (!btn) return;
		if (btn.dataset.action === 'ver') {
			selectedId = selectedId === btn.dataset.id ? null : btn.dataset.id;
			safeRender();
		}
	});

	document.getElementById('q').addEventListener('input', safeRender);
	document.getElementById('filterClasif').addEventListener('change', safeRender);
	document.getElementById('filterEstado').addEventListener('change', safeRender);

	function subscribeRealtime() {
		if (!authReady) { setTimeout(subscribeRealtime, 500); return; }
		fbDb.collection('mediciones').where('proveedor', '==', PROVIDER_KEY)
			.onSnapshot(snap => {
				snap.docChanges().forEach(change => {
					const data = change.doc.data() || {};
					const docId = change.doc.id;
					let localId = states.has(docId) || items.find(x => x.id === docId) ? docId : null;
					if (!localId) return;
					
					const st = states.get(localId) || { estado: 'pendiente', files: [] };
					if (change.type === 'removed') { states.delete(localId); return; }
					
					st.estado = data.estado || st.estado;
					if (data.estado === 'pendiente' && data.observacion_rechazo) st.observacion_rechazo = data.observacion_rechazo;
					else delete st.observacion_rechazo;
					
					states.set(localId, st);
				});
				safeRender();
			});
	}

	(async function init() {
		ALL_CLASSES.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; document.getElementById('filterClasif').appendChild(o); });
		subscribeRealtime();
		safeRender();
	})();
	</script>
</body>
</html>
